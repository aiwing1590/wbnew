<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>WB AI Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Кофейный цвет для кнопок: bg-[#6f4e37] */
        .coffee-bg { background-color: #6f4e37 !important; }
        .coffee-hover:hover { background-color: #5a3e2d !important; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease forwards; }
        
        /* Блок выбора файла - центр экрана */
        #upload-container {
            transition: all 0.8s cubic-bezier(0.65, 0, 0.35, 1);
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            z-index: 20;
        }
        /* Состояние после нажатия - улетает вверх */
        .fly-away {
            top: 5% !important;
            transform: translate(-50%, 0) scale(0.8) !important;
            opacity: 0.7;
        }
    </style>
</head>
<body class="bg-[#f4f4f0] text-[#2d2d2d] font-sans min-h-screen flex flex-col items-center">

    <!-- Блок выбора файла -->
    <div id="upload-container" class="bg-white/70 backdrop-blur-md border border-stone-200 rounded-3xl p-8 shadow-xl flex flex-col items-center gap-4">
        <h2 class="font-serif text-xl">Загрузка отчета</h2>
        <input type="file" id="file-uploader" accept=".xlsx" class="w-full text-sm text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-stone-200 cursor-pointer">
        <button id="submit-btn" class="coffee-bg coffee-hover text-white px-8 py-3 rounded-full transition-all w-full">Запустить анализ</button>
    </div>

    <!-- Основной экран (изначально скрыт) -->
    <div id="app-screen" class="hidden w-full max-w-4xl px-4 py-12 flex-col gap-6 animate-fade-in mt-20">
        <div id="results-section" class="hidden flex-col gap-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-white border p-5 rounded-xl shadow-sm"><div class="text-xs uppercase text-stone-500">Выручка</div><div id="revenue-val" class="text-2xl font-serif">0 ₽</div></div>
                <div class="bg-white border p-5 rounded-xl shadow-sm"><div class="text-xs uppercase text-stone-500">Чистая прибыль</div><div id="profit-val" class="text-2xl font-serif">0 ₽</div></div>
            </div>
            <div id="expenses-section" class="bg-white border rounded-xl p-6 shadow-sm">
                <h3 class="font-serif text-xl mb-4">Расходы</h3>
                <div id="expenses-list" class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm"></div>
            </div>
            <div class="bg-white border p-6 rounded-xl shadow-sm">
                <h3 class="font-serif text-xl mb-4">Спросить ИИ</h3>
                <input type="text" id="query-input" class="w-full border rounded-lg px-4 py-2 mb-2" placeholder="Ваш вопрос...">
                <button id="ask-btn" class="coffee-bg coffee-hover text-white px-6 py-2 rounded-lg">Спросить</button>
                <div id="ai-response-box" class="hidden mt-4 p-4 bg-stone-50 rounded-lg border text-sm"></div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://wbagent-real.onrender.com';
        
        document.getElementById('submit-btn').addEventListener('click', async () => {
            const file = document.getElementById('file-uploader').files[0];
            if (!file) return alert('Выберите файл!');
            
            // Запускаем анимацию улетания
            document.getElementById('upload-container').classList.add('fly-away');
            
            // Показываем контент через небольшую задержку, чтобы анимация была плавной
            setTimeout(() => {
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('flex');
            }, 400);

            const formData = new FormData();
            formData.append('file', file);
            formData.append('app_password', '123'); // Пароль пока хардкодом для простоты
            
            const res = await fetch(`${BACKEND_URL}/analyze`, { method: 'POST', body: formData });
            const data = await res.json();
            
            if (data.error) return alert(data.error);
            document.getElementById('revenue-val').innerText = Number(data.total_revenue).toLocaleString('ru-RU') + ' ₽';
            document.getElementById('profit-val').innerText = Number(data.net_profit).toLocaleString('ru-RU') + ' ₽';
            
            const expList = document.getElementById('expenses-list'); expList.innerHTML = '';
            for (const [k, v] of Object.entries(data.expenses)) expList.innerHTML += `<div>${k}:<br><strong>${v.toLocaleString('ru-RU')} ₽</strong></div>`;
            document.getElementById('expenses-section').classList.remove('hidden');
            document.getElementById('results-section').classList.remove('hidden');
            document.getElementById('results-section').classList.add('flex');
        });
    </script>
</body>
</html>
