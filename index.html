<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WB AI Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .spinner { border: 3px solid #e5e5e0; border-top: 3px solid #2d2d2d; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-[#f4f4f0] text-[#2d2d2d] font-sans min-h-screen flex flex-col items-center">

    <div id="login-screen" class="flex-grow flex items-center justify-center w-full px-4">
        <div class="bg-white border border-[#e5e5e0] rounded-2xl p-10 shadow-sm max-w-sm w-full text-center animate-fade-in">
            <h1 class="font-serif text-3xl mb-8">WB AI Agent</h1>
            <input type="password" id="auth-password" placeholder="Пароль" class="w-full border border-[#e5e5e0] rounded-xl px-4 py-3 text-center mb-4 focus:outline-none">
            <button id="login-btn" class="w-full bg-[#2d2d2d] text-white rounded-xl py-3 hover:bg-black transition-all">Войти</button>
        </div>
    </div>

    <div id="app-screen" class="hidden w-full max-w-4xl px-4 py-12 flex-col gap-6 animate-fade-in">
        <header class="text-center mb-4"><h1 class="font-serif text-3xl">Аналитика отчета</h1></header>

        <div class="bg-white border border-[#e5e5e0] rounded-xl p-6 shadow-sm flex flex-col md:flex-row items-center gap-4">
            <input type="file" id="file-uploader" accept=".xlsx" class="flex-grow w-full text-sm text-stone-500 border border-dashed border-[#e5e5e0] rounded-lg p-2">
            <button id="submit-btn" class="bg-[#2d2d2d] text-white px-6 py-3 rounded-lg hover:bg-black">Запустить анализ</button>
        </div>

        <div id="loader" class="hidden flex flex-col items-center py-8 gap-3"><div class="spinner"></div><p>Анализ данных...</p></div>

        <div id="results-section" class="hidden flex-col gap-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white border border-[#e5e5e0] p-5 rounded-xl"><div class="text-xs uppercase text-stone-500">Выручка</div><div id="revenue-val" class="text-2xl font-serif">0 ₽</div></div>
                <div class="bg-white border border-[#e5e5e0] p-5 rounded-xl"><div class="text-xs uppercase text-stone-500">Чистая прибыль</div><div id="profit-val" class="text-2xl font-serif">0 ₽</div></div>
                <div class="bg-white border border-[#e5e5e0] p-5 rounded-xl"><div class="text-xs uppercase text-stone-500">Статус</div><div id="best-product-val" class="text-sm">...</div></div>
            </div>

            <div id="expenses-section" class="hidden bg-white border border-[#e5e5e0] rounded-xl p-6 shadow-sm">
                <h3 class="font-serif text-xl mb-4">Детальные расходы</h3>
                <div id="expenses-list" class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm"></div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://wbagent-real.onrender.com';
        let savedPassword = '';

        document.getElementById('login-btn').addEventListener('click', () => {
            savedPassword = document.getElementById('auth-password').value.trim();
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('app-screen').classList.add('flex');
        });

        document.getElementById('submit-btn').addEventListener('click', async () => {
            const file = document.getElementById('file-uploader').files[0];
            if (!file) return alert('Выберите файл!');
            document.getElementById('loader').classList.remove('hidden');
            const formData = new FormData();
            formData.append('file', file); formData.append('app_password', savedPassword);
            
            const res = await fetch(`${BACKEND_URL}/analyze`, { method: 'POST', body: formData });
            const data = await res.json();
            document.getElementById('loader').classList.add('hidden');
            if (data.error) return alert(data.error);

            document.getElementById('revenue-val').innerText = Number(data.total_revenue).toLocaleString('ru-RU') + ' ₽';
            document.getElementById('profit-val').innerText = Number(data.net_profit).toLocaleString('ru-RU') + ' ₽';
            document.getElementById('best-product-val').innerText = data.best_product;

            const expList = document.getElementById('expenses-list');
            expList.innerHTML = '';
            for (const [key, val] of Object.entries(data.expenses)) {
                expList.innerHTML += `<div><span class="text-stone-500">${key}:</span><br><strong>${val.toLocaleString('ru-RU')} ₽</strong></div>`;
            }
            document.getElementById('expenses-section').classList.remove('hidden');
            document.getElementById('results-section').classList.remove('hidden');
            document.getElementById('results-section').classList.add('flex');
        });
    </script>
</body>
</html>
