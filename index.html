<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>WB AI Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div id="app" class="max-w-lg mx-auto bg-white p-6 rounded-xl shadow">
        <h1 class="text-xl font-bold mb-4">WB AI Agent</h1>
        <input type="password" id="pass" class="border p-2 w-full mb-2" placeholder="Пароль">
        <input type="file" id="file" class="w-full mb-2">
        <button id="run" class="bg-black text-white px-4 py-2 w-full">Анализ</button>
        <div id="res" class="mt-4 p-4 bg-gray-50 rounded hidden"></div>
    </div>

    <script>
        document.getElementById('run').onclick = async () => {
            const fd = new FormData();
            fd.append('file', document.getElementById('file').files[0]);
            fd.append('app_password', document.getElementById('pass').value);
            
            try {
                const res = await fetch('https://wbagent-real.onrender.com/analyze', { method: 'POST', body: fd });
                const d = await res.json();
                if(d.error) alert(d.error);
                else {
                    document.getElementById('res').innerHTML = `Выручка: ${d.total_revenue} ₽<br>Прибыль: ${d.net_profit} ₽`;
                    document.getElementById('res').classList.remove('hidden');
                }
            } catch(e) { alert("Ошибка подключения к серверу: " + e.message); }
        };
    </script>
</body>
</html>
