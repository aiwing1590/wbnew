<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>WB AI Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f4f4f0] text-[#2d2d2d] font-sans min-h-screen">

    <!-- Экран входа -->
    <div id="login-screen" class="fixed inset-0 flex items-center justify-center bg-[#f4f4f0] z-50">
        <div class="bg-white border rounded-2xl p-10 shadow-sm max-w-sm w-full text-center">
            <h1 class="font-serif text-3xl mb-8">WB AI Agent</h1>
            <input type="password" id="auth-password" placeholder="Пароль" class="w-full border rounded-xl px-4 py-3 text-center mb-4">
            <button id="login-btn" class="w-full bg-[#6f4e37] text-white rounded-xl py-3">Войти</button>
        </div>
    </div>

    <!-- Основной экран -->
    <div id="app-screen" class="w-full max-w-4xl mx-auto px-4 py-12">
        <div id="upload-container" class="bg-white border rounded-2xl p-8 shadow-sm">
            <input type="file" id="file-uploader" class="w-full mb-4">
            <button id="submit-btn" class="bg-[#6f4e37] text-white px-8 py-3 rounded-full w-full">Анализ</button>
        </div>
        
        <div id="results-section" class="hidden mt-8 grid grid-cols-2 gap-4">
            <div class="bg-white p-5 rounded-xl border">Выручка: <div id="rev" class="text-xl font-bold">0 ₽</div></div>
            <div class="bg-white p-5 rounded-xl border">Прибыль: <div id="prof" class="text-xl font-bold">0 ₽</div></div>
            <div id="exp-list" class="col-span-2 bg-white p-5 rounded-xl border"></div>
        </div>
    </div>

    <script>
        document.getElementById('login-btn').addEventListener('click', () => {
            if (document.getElementById('auth-password').value === "Wb123prof") {
                document.getElementById('login-screen').style.display = 'none';
            } else { alert("Неверный пароль!"); }
        });

        document.getElementById('submit-btn').addEventListener('click', async () => {
            const file = document.getElementById('file-uploader').files[0];
            if (!file) return alert('Файл не выбран!');
            
            const fd = new FormData();
            fd.append('file', file);
            fd.append('app_password', 'Wb123prof');
            
            try {
                const res = await fetch('https://wbagent-real.onrender.com/analyze', { method: 'POST', body: fd });
                if (!res.ok) throw new Error('Ошибка сервера');
                const d = await res.json();
                
                // ЗАЩИТА ОТ ТВОЕЙ ОШИБКИ: проверяем, что данные пришли
                if (!d || d.error) throw new Error(d.error || 'Пустой ответ');
                
                document.getElementById('rev').innerText = (d.total_revenue || 0).toLocaleString() + ' ₽';
                document.getElementById('prof').innerText = (d.net_profit || 0).toLocaleString() + ' ₽';
                
                const exp = document.getElementById('exp-list');
                exp.innerHTML = '<strong>Расходы:</strong><br>';
                // Безопасная проверка объекта расходов
                const exps = d.expenses || {};
                for (let k in exps) { exp.innerHTML += `${k}: ${exps[k].toLocaleString()} ₽<br>`; }
                
                document.getElementById('results-section').classList.remove('hidden');
                document.getElementById('upload-container').style.display = 'none';
            } catch (e) { alert('Ошибка: ' + e.message); }
        });
    </script>
</body>
</html>
