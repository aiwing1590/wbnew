<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-[#f4f4f0] p-10">

    <div id="login-screen" class="fixed inset-0 flex items-center justify-center bg-[#f4f4f0] z-50">
        <div class="bg-white p-10 rounded-2xl shadow-lg text-center">
            <h1 class="text-2xl mb-4">WB AI Agent</h1>
            <input type="password" id="p" class="border p-2 rounded mb-2 w-full" placeholder="Пароль">
            <button id="btn-login" class="bg-black text-white px-4 py-2 rounded w-full">Войти</button>
        </div>
    </div>

    <div id="app" class="max-w-2xl mx-auto">
        <input type="file" id="f" class="mb-4">
        <button id="btn-send" class="bg-black text-white px-4 py-2 rounded">Анализ</button>
        <div id="res" class="mt-4 p-4 bg-white rounded shadow hidden"></div>
    </div>

    <script>
        document.getElementById('btn-login').onclick = () => {
            if (document.getElementById('p').value === "Wb123prof") {
                document.getElementById('login-screen').style.display = 'none';
            } else { alert("Неверный пароль!"); }
        };

        document.getElementById('btn-send').onclick = async () => {
            const file = document.getElementById('f').files[0];
            const fd = new FormData();
            fd.append('file', file);
            fd.append('app_password', 'Wb123prof');
            
            try {
                const res = await fetch('https://wbagent-real.onrender.com/analyze', { method: 'POST', body: fd });
                const text = await res.text(); // Читаем как текст, чтобы не было ошибки парсинга
                console.log("Ответ сервера:", text);
                
                let d;
                try { d = JSON.parse(text); } catch(e) { throw new Error("Сервер не прислал JSON: " + text); }
                
                if (d.error) throw new Error(d.error);
                
                const resDiv = document.getElementById('res');
                resDiv.innerHTML = `Выручка: ${d.total_revenue || 0} ₽<br>Прибыль: ${d.net_profit || 0} ₽`;
                resDiv.classList.remove('hidden');
            } catch (e) { alert("Ошибка: " + e.message); }
        };
    </script>
</body>
</html>
