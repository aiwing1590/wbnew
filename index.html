<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WB AI Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        claudeBg: '#f4f4f0',    // Светлый кремовый фон
                        claudeCard: '#ffffff',  // Чисто белые карточки
                        claudeText: '#2d2d2d',  // Мягкий темный текст
                        claudeBorder: '#e5e5e0' // Аккуратные серые границы
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
                        serif: ['Georgia', 'Cambria', '"Times New Roman"', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        .spinner {
            border: 3px solid #e5e5e0;
            border-top: 3px solid #2d2d2d;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-claudeBg text-claudeText font-sans min-h-screen flex flex-col items-center">

    <!-- 1. ЭКРАН ВХОДА -->
    <div id="login-screen" class="flex-grow flex items-center justify-center w-full px-4">
        <div class="bg-claudeCard border border-claudeBorder rounded-xl p-8 shadow-sm max-w-sm w-full text-center">
            <h1 class="font-serif text-3xl mb-2">WB AI Agent</h1>
            <p class="text-stone-500 mb-6 text-sm">Введите пароль для доступа к системе</p>
            <input type="password" id="auth-password" placeholder="Пароль" class="w-full border border-claudeBorder rounded-lg px-4 py-2.5 mb-4 focus:outline-none focus:border-stone-400 transition-colors">
            <button id="login-btn" class="w-full bg-claudeText text-white rounded-lg py-2.5 hover:bg-black transition-colors font-medium">Войти</button>
        </div>
    </div>

    <!-- 2. ОСНОВНОЙ ЭКРАН ПРИЛОЖЕНИЯ -->
    <div id="app-screen" class="hidden w-full max-w-4xl px-4 py-12 flex-col gap-6">
        
        <header class="text-center mb-4">
            <h1 class="font-serif text-3xl">Аналитика отчета</h1>
        </header>

        <!-- Загрузка файла -->
        <div class="bg-claudeCard border border-claudeBorder rounded-xl p-6 shadow-sm flex flex-col md:flex-row items-center gap-4">
            <input type="file" id="file-uploader" accept=".xlsx" class="flex-grow w-full text-sm text-stone-500
                file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0
                file:text-sm file:font-medium file:bg-stone-100 file:text-stone-700
                hover:file:bg-stone-200 cursor-pointer border border-dashed border-claudeBorder rounded-lg p-2">
            <button id="submit-btn" class="bg-claudeText text-white px-6 py-3 rounded-lg hover:bg-black transition-colors font-medium whitespace-nowrap">
                Запустить анализ
            </button>
        </div>

        <!-- Лоадер -->
        <div id="loader" class="hidden flex flex-col items-center justify-center py-8 gap-3">
            <div class="spinner"></div>
            <p class="text-stone-500 text-sm">Агент изучает данные...</p>
        </div>

        <!-- Секция результатов -->
        <div id="results-section" class="hidden flex-col gap-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-claudeCard border border-claudeBorder p-5 rounded-xl shadow-sm">
                    <div class="text-xs text-stone-500 uppercase tracking-wider mb-1">Выручка</div>
                    <div id="revenue-val" class="text-2xl font-serif">0 ₽</div>
                </div>
                <div class="bg-claudeCard border border-claudeBorder p-5 rounded-xl shadow-sm">
                    <div class="text-xs text-stone-500 uppercase tracking-wider mb-1">Чистая прибыль</div>
                    <div id="profit-val" class="text-2xl font-serif">0 ₽</div>
                </div>
                <div class="bg-claudeCard border border-claudeBorder p-5 rounded-xl shadow-sm">
                    <div class="text-xs text-stone-500 uppercase tracking-wider mb-1">Топ-товар</div>
                    <div id="best-product-val" class="text-lg font-serif truncate">...</div>
                </div>
            </div>

            <div class="bg-claudeCard border border-claudeBorder p-6 rounded-xl shadow-sm flex flex-col gap-4">
                <h3 class="font-serif text-xl">Спросить ИИ-агента</h3>
                <div class="flex gap-2">
                    <input type="text" id="query-input" placeholder="Задайте вопрос по отчету..." class="flex-grow border border-claudeBorder rounded-lg px-4 py-2 focus:outline-none focus:border-stone-400">
                    <button id="ask-btn" class="bg-stone-100 border border-claudeBorder text-claudeText px-6 py-2 rounded-lg hover:bg-stone-200 transition-colors font-medium">Спросить</button>
                </div>
                <div id="ai-response-box" class="hidden mt-2 text-stone-700 leading-relaxed text-sm p-4 bg-stone-50 rounded-lg border border-claudeBorder whitespace-pre-line"></div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://wbagent-y5z6.onrender.com';
        let savedPassword = '';

        const loginScreen = document.getElementById('login-screen');
        const appScreen = document.getElementById('app-screen');
        const authPassword = document.getElementById('auth-password');
        const loginBtn = document.getElementById('login-btn');
        
        const fileInput = document.getElementById('file-uploader');
        const submitBtn = document.getElementById('submit-btn');
        const loader = document.getElementById('loader');
        const resultsSection = document.getElementById('results-section');
        const queryInput = document.getElementById('query-input');
        const askBtn = document.getElementById('ask-btn');

        loginBtn.addEventListener('click', () => {
            const pass = authPassword.value.trim();
            if (!pass) return alert('Пожалуйста, введите пароль.');
            savedPassword = pass; 
            loginScreen.classList.add('hidden');
            appScreen.classList.remove('hidden');
            appScreen.classList.add('flex');
        });

        authPassword.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });

        submitBtn.addEventListener('click', () => sendRequest());
        askBtn.addEventListener('click', () => {
            if (!queryInput.value.trim()) return alert('Введите вопрос!');
            sendRequest(queryInput.value.trim());
        });

        async function sendRequest(userQuery = "") {
            const file = fileInput.files[0];
            if (!file) return alert('Пожалуйста, выберите Excel-файл!');

            loader.classList.remove('hidden');
            if (!userQuery) resultsSection.classList.add('hidden');

            const formData = new FormData();
            formData.append('file', file);
            formData.append('app_password', savedPassword); 
            if (userQuery) formData.append('user_query', userQuery);

            try {
                const response = await fetch(`${BACKEND_URL}/analyze`, { method: 'POST', body: formData });
                if (!response.ok) throw new Error('Сервер упал при обработке файла.');
                const data = await response.json();

                if (data.error) {
                    alert(`Ошибка: ${data.error}`);
                    if (data.error.toLowerCase().includes('пароль')) {
                        appScreen.classList.add('hidden');
                        appScreen.classList.remove('flex');
                        loginScreen.classList.remove('hidden');
                        authPassword.value = '';
                    }
                } else {
                    document.getElementById('revenue-val').innerText = Number(data.total_revenue).toLocaleString('ru-RU') + ' ₽';
                    document.getElementById('profit-val').innerText = Number(data.net_profit).toLocaleString('ru-RU') + ' ₽';
                    document.getElementById('best-product-val').innerText = data.best_product;

                    const aiBox = document.getElementById('ai-response-box');
                    if (data.ai_response) {
                        aiBox.innerText = data.ai_response;
                        aiBox.classList.remove('hidden');
                    }
                    resultsSection.classList.remove('hidden');
                    resultsSection.classList.add('flex');
                }
            } catch (err) {
                console.error(err);
                alert('Произошла ошибка на сервере Render. Проверь логи!');
            } finally {
                loader.classList.add('hidden'); 
            }
        }
    </script>
</body>
</html>
